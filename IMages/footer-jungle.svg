<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-labelledby="t d">
  <title id="t">Impleo — Faster applications. Better stories. Still your voice.</title>
  <desc id="d">Leaves drifting through a dark jungle canopy above the Impleo tagline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0F0E"/>
      <stop offset="100%" stop-color="#002B2B"/>
    </linearGradient>

    <!-- The brand "chameleon shift": green -> lime -> signature yellow. -->
    <linearGradient id="shift" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#28C94E"/>
      <stop offset="55%" stop-color="#A6D91A"/>
      <stop offset="100%" stop-color="#F5D000"/>
    </linearGradient>

    <!-- Same ramp, but in user space. A horizontal <line> has a zero-height
         bounding box, so the default objectBoundingBox units make the gradient
         degenerate and the stroke never paints at all. -->
    <linearGradient id="shift-line" gradientUnits="userSpaceOnUse" x1="440" y1="0" x2="760" y2="0">
      <stop offset="0%" stop-color="#28C94E"/>
      <stop offset="55%" stop-color="#A6D91A"/>
      <stop offset="100%" stop-color="#F5D000"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#A6D91A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#A6D91A" stop-opacity="0"/>
    </radialGradient>

    <!-- Same two-mirrored-curves leaf the site draws to canvas in LeafField.
         Three sizes as separate defs rather than one leaf + scale(): the CSS
         transform that drives the fall would override a transform attribute on
         the same element, so the scale would silently never apply. -->
    <path id="leaf-s" d="M0,-6 Q6,0 0,6 Q-6,0 0,-6"/>
    <path id="leaf-m" d="M0,-9 Q9,0 0,9 Q-9,0 0,-9"/>
    <path id="leaf-l" d="M0,-12 Q12,0 0,12 Q-12,0 0,-12"/>
  </defs>

  <style>
    /* Rendered inside an &lt;img&gt;, so everything must be self-contained. */
    .leaf { transform-box: fill-box; transform-origin: center; animation: fall linear infinite; }
    @keyframes fall {
      0%   { transform: translate(0px, -40px) rotate(0deg); opacity: 0; }
      12%  { opacity: 1; }
      50%  { transform: translate(16px, 130px) rotate(170deg); }
      88%  { opacity: 1; }
      100% { transform: translate(-8px, 300px) rotate(330deg); opacity: 0; }
    }

    .glow { animation: breathe 5s ease-in-out infinite; transform-origin: center; }
    @keyframes breathe { 0%,100% { opacity: .55 } 50% { opacity: 1 } }

    /* Draws itself once on load — the same hairline the site uses under a CTA. */
    .rule { stroke-dasharray: 320; stroke-dashoffset: 320; animation: draw 1.6s cubic-bezier(.4,0,.2,1) .35s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0 } }

    .fade { opacity: 0; animation: rise .9s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
    .d1 { animation-delay: .10s } .d2 { animation-delay: .28s } .d3 { animation-delay: .46s }

    /* Honour the same rule the product does: motion is never mandatory. */
    @media (prefers-reduced-motion: reduce) {
      .leaf, .glow, .rule, .fade { animation: none; }
      .leaf { opacity: .3; }
      .rule { stroke-dashoffset: 0; }
      .fade { opacity: 1; }
    }
  </style>

  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect class="glow" width="1200" height="260" fill="url(#glow)"/>

  <!-- Canopy fronds, anchored to the corners so the band reads as a clearing. -->
  <g fill="#00A050" opacity="0.20">
    <path d="M0,0 C90,18 150,60 168,128 C104,96 40,58 0,44 Z"/>
    <path d="M1200,0 C1110,18 1050,60 1032,128 C1096,96 1160,58 1200,44 Z"/>
  </g>
  <g fill="#A6D91A" opacity="0.10">
    <path d="M0,0 C74,10 128,44 150,96 C92,68 36,38 0,30 Z"/>
    <path d="M1200,0 C1126,10 1072,44 1050,96 C1108,68 1164,38 1200,30 Z"/>
  </g>

  <!-- Drifting leaves. x set on the group, motion on the leaf itself, so the
       spin has its own origin and the two transforms never fight. -->
  <g>
    <g transform="translate(58,0)"><use class="leaf" href="#leaf-m" fill="#A6D91A" opacity=".30" style="animation-duration:11s;animation-delay:-1s"/></g>
    <g transform="translate(142,0)"><use class="leaf" href="#leaf-l" fill="#28C94E" opacity=".26" style="animation-duration:14s;animation-delay:-6s"/></g>
    <g transform="translate(226,0)"><use class="leaf" href="#leaf-s" fill="#00A050" opacity=".22" style="animation-duration:9.5s;animation-delay:-3s"/></g>
    <g transform="translate(318,0)"><use class="leaf" href="#leaf-m" fill="#A6D91A" opacity=".18" style="animation-duration:13s;animation-delay:-8s"/></g>
    <g transform="translate(402,0)"><use class="leaf" href="#leaf-s" fill="#28C94E" opacity=".28" style="animation-duration:10.5s;animation-delay:-2s"/></g>
    <g transform="translate(498,0)"><use class="leaf" href="#leaf-l" fill="#00A050" opacity=".16" style="animation-duration:15s;animation-delay:-11s"/></g>
    <g transform="translate(596,0)"><use class="leaf" href="#leaf-s" fill="#A6D91A" opacity=".20" style="animation-duration:12s;animation-delay:-4s"/></g>
    <g transform="translate(690,0)"><use class="leaf" href="#leaf-m" fill="#28C94E" opacity=".24" style="animation-duration:10s;animation-delay:-7s"/></g>
    <g transform="translate(784,0)"><use class="leaf" href="#leaf-s" fill="#00A050" opacity=".18" style="animation-duration:13.5s;animation-delay:-9s"/></g>
    <g transform="translate(872,0)"><use class="leaf" href="#leaf-l" fill="#A6D91A" opacity=".30" style="animation-duration:11.5s;animation-delay:-5s"/></g>
    <g transform="translate(964,0)"><use class="leaf" href="#leaf-m" fill="#28C94E" opacity=".22" style="animation-duration:9s;animation-delay:-2.5s"/></g>
    <g transform="translate(1052,0)"><use class="leaf" href="#leaf-l" fill="#00A050" opacity=".26" style="animation-duration:14.5s;animation-delay:-10s"/></g>
    <g transform="translate(1140,0)"><use class="leaf" href="#leaf-s" fill="#A6D91A" opacity=".20" style="animation-duration:12.5s;animation-delay:-6.5s"/></g>
  </g>

  <g text-anchor="middle" font-family="Geist, 'Segoe UI', Inter, system-ui, -apple-system, sans-serif">
    <text class="fade d1" x="600" y="96" fill="#A6D91A" font-size="12" font-weight="600" letter-spacing="3.4">
      AI SHOULD ACCELERATE APPLICATIONS, NOT REPLACE JUDGMENT
    </text>
    <text class="fade d2" x="600" y="148" fill="#F5F5F5" font-size="32" font-weight="600" letter-spacing="-0.6">
      Faster applications. Better stories.
    </text>
    <text class="fade d3" x="600" y="196" fill="url(#shift)" font-size="34" font-weight="700" letter-spacing="-0.6">
      Still your voice.
    </text>
  </g>

  <line class="rule" x1="440" y1="224" x2="760" y2="224" stroke="url(#shift-line)" stroke-width="2" stroke-linecap="round"/>

  <text x="600" y="248" text-anchor="middle" fill="#737373" font-size="11.5" letter-spacing="1.2"
        font-family="Geist, 'Segoe UI', Inter, system-ui, -apple-system, sans-serif">
    Bring your own key · Runs locally · Never auto-submits
  </text>
</svg>
